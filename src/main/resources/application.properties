spring.application.name=stu-manage-cloud

# Database Connection
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://db.lrrcmkfrwvocctihxliv.supabase.co:5432/postgres}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:yourpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Port
server.port=8080

# ✅ THIS IS THE FIX — disables prepared statements
spring.datasource.hikari.connection-init-sql=SET SESSION CHARACTERISTICS AS TRANSACTION ISOLATION LEVEL READ COMMITTED
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=true
spring.datasource.hikari.data-source-properties.prepareThreshold=0