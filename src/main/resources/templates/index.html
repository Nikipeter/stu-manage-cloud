<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Management</title>
</head>
<body>

<h2>Student List</h2>

<button><a href="/showNewStudentForm">Add Student</a></button>

<br/><br/>

<table border="1" cellpadding="8">

    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Course</th>
            <!-- ✅ NEW column -->
            <th>Actions</th>
            <th>Delete</th>
        </tr>
    </thead>

    <tbody>
        <tr th:each="student : ${students}">
            <td th:text="${student.id}"></td>
            <td th:text="${student.name}"></td>
            <td th:text="${student.email}"></td>
            <td th:text="${student.course}"></td>

            <!-- ✅ NEW — Edit button for each row -->
            <td>
                <a th:href="@{/showFormForUpdate/{id}(id=${student.id})}">Edit</a>
            </td>
            <td><a th:href="@{/deleteStudent/{id}(id=${student.id})}">Delete</a></td>
        </tr>
    </tbody>

</table>

</body>
</html>
